        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored === 'light' || stored === 'dark' ? stored : (prefersDark ? 'dark' : 'light');

        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#0a0a0f' : '#f8fafc');
      })();

    <!-- Premium Logo Preloader Overlay -->
    <div id="preloader" class="preloader-overlay">
      <style>
        .preloader-overlay {
          position: fixed;
          inset: 0;
          background-color: #f8fafc;
          z-index: 99999;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
          will-change: transform, opacity;
        }
        html.dark .preloader-overlay {
          background-color: #0a0a0f;
        }
        .preloader-content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1.5rem;
        }
        .preloader-logo {
          width: 88px;
          height: 88px;
          opacity: 0;
          transform: scale(0.85);
          animation: preloader-logo-enter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
          will-change: transform, opacity;
        }
        .preloader-bar-container {
          width: 120px;
          height: 2px;
          background-color: rgba(59, 130, 246, 0.08);
          border-radius: 9999px;
          overflow: hidden;
          position: relative;
        }
        html.dark .preloader-bar-container {
          background-color: rgba(96, 165, 250, 0.08);
        }
        .preloader-bar {
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 100%;
          background: linear-gradient(90deg, #3b82f6, #60a5fa, #4f46e5);
          border-radius: 9999px;
          animation: preloader-bar-load 1.8s cubic-bezier(0.65, 0.05, 0.36, 1) infinite;
          transform-origin: left;
        }
        .preloader-overlay.exit {
          opacity: 0;
          pointer-events: none;
          transform: scale(1.04);
        }
        @keyframes preloader-logo-enter {
          to {
            opacity: 1;
            transform: scale(1);
          }
        }
        @keyframes preloader-bar-load {
          0% {
            transform: scaleX(0);
            left: 0;
          }
          50% {
            transform: scaleX(0.4);
            left: 30%;
          }
          100% {
            transform: scaleX(0);
            left: 100%;
          }
        }
      </style>
      <div class="preloader-content">
        <img src="/images/logo_mark.webp" alt="Draizen Logo" class="preloader-logo" />
        <div class="preloader-bar-container">
          <div class="preloader-bar"></div>
        </div>
      </div>
    </div>
    
    <script>
      (function() {
        var overlay = document.getElementById('preloader');
        var isDismissed = false;
        var minTimeElapsed = false;

        // Ensure preloader displays for at least 1500ms
        setTimeout(function() {
          minTimeElapsed = true;
          if (isDismissed) {
            triggerExit();
          }
        }, 1500);

        function triggerExit() {
          if (overlay) {
            overlay.classList.add('exit');
            setTimeout(function() {
              if (overlay.parentNode) {
                overlay.parentNode.removeChild(overlay);
              }
            }, 600);
          }
        }

        window.dismissPreloader = function() {
          isDismissed = true;
          if (minTimeElapsed) {
            triggerExit();
          } else {
            var timeRemaining = 1500 - (Date.now() - (window.preloaderStartTime || Date.now()));
            setTimeout(triggerExit, Math.max(0, timeRemaining));
          }
        };

        window.preloaderStartTime = Date.now();
      })();
    </script>
